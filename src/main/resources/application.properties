spring.application.name=fliplearn-backend

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/fliplearn
spring.datasource.username=fliplearn
spring.datasource.password=fliplearn_dev_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.org.hibernate.SQL=DEBUG

app.google.client-id=1088499579930-12v7uf5fbs68hkt0usanh4ic0no361bd.apps.googleusercontent.com
app.jwt.secret=${JWT_SECRET:fliplearn-development-secret-key-change-me-2026}
app.jwt.expiration=3600000