services:
  postgres:
    image: postgres:17
    container_name: fliplearn-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: fliplearn
      POSTGRES_USER: fliplearn
      POSTGRES_PASSWORD: fliplearn_dev_password

    ports:
      - "5432:5432"

    volumes:
      - fliplearn-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fliplearn -d fliplearn"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fliplearn-postgres-data: